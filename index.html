<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swirl Index</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            background: linear-gradient(135deg, #f5e0dc 0%, #b4befe 100%);
            color: #1e1e2e;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1em;
        }
        nav {
            display: flex;
            gap: 2em;
            margin-bottom: 2em;
        }
        a {
            background: #b4befe;
            color: #1e1e2e;
            text-decoration: none;
            padding: 0.5em 1em;
            border-radius: 0.5em;
            font-size: 1.2rem;
            box-shadow: 0 2px 8px #b4befe33;
        }
        a:hover {
            background: #cdd6f4;
        }
        img {
            border-radius: 1em;
            box-shadow: 0 4px 24px #b4befe55;
            max-width: 200px;
            margin-top: 2em;
        }
    </style>
</head>
<body>
    <h1>Swirl Static Site</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
    </nav>
    <img src="https://catppuccin.github.io/assets/cat.png" alt="Catppuccin Cat">
    <div style="margin-top:2em;font-size:1.1rem;background:#f5e0dc;padding:1em 2em;border-radius:1em;box-shadow:0 2px 8px #b4befe33;">Welcome to Swirl! Explore the fun, colors, and cats.</div>
</body>
</html>
