<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why I love catppuccin</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Sans', 'Segoe UI', Arial, sans-serif; }
        .reason-list { margin: 2em 0; padding: 1em; background: var(--ctp-surface0); border-radius: 1em; color: var(--ctp-yellow); }
        .special { color: var(--ctp-peach); font-weight: bold; font-size: 1.3em; text-shadow: 1px 1px var(--ctp-mauve); }
        .para1 { background: var(--ctp-blue); color: var(--ctp-crust); padding: 1em; border-radius: 0.5em; margin-bottom: 1em; }
        .para2 { background: var(--ctp-green); color: var(--ctp-base); padding: 1em; border-radius: 0.5em; margin-bottom: 1em; font-style: italic; }
        .para3 { background: var(--ctp-red); color: var(--ctp-text); padding: 1em; border-radius: 0.5em; margin-bottom: 1em; text-decoration: underline; }
        .custom-btn { background: var(--ctp-mauve); color: var(--ctp-crust); border: none; padding: 0.7em 1.5em; border-radius: 0.5em; font-size: 1.1em; cursor: pointer; margin: 1em 0; transition: background 0.2s, color 0.2s; }
        .custom-btn:hover { background: var(--ctp-pink); color: var(--ctp-base); }
        footer { margin-top: 3em; color: var(--ctp-overlay2); font-size: 1em; }
        .bookmark { display: block; margin: 2em 0; color: var(--ctp-sapphire); font-size: 1.1em; }
    </style>
</head>
<body>
    <h1 id="top">Why I love catppuccin</h1>
    <img src="catppuccin.png" alt="Catppuccin Cat">
    <div style="margin-top:2em; display:flex; gap:1em;">
        <button class="custom-btn">Reason 1</button>
        <button class="custom-btn">Reason 2</button>
        <button class="custom-btn">Reason 3</button>
    </div>

    <a class="bookmark" href="#bottom">Jump to bottom</a>

    <ul class="reason-list">
        <li>Beautiful pastel colors</li>
        <li>Great for coding themes</li>
        <li>Fun community</li>
    </ul>

    <p class="para1">Catppuccin makes my editor look <span class="special">amazing</span> every day.</p>
    <p class="para2">It looks very noice</p>
    <p class="para3">The Catppuccin cat is very tuff</p>

    <audio controls style="margin:2em 0;">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <footer id="bottom">
        <p>Find us on <a href="https://github.com/kashsuks/swirl" target="_blank">GitHub</a> |
        <a href="ksukshavasi@gmail.com">Email</a> |
        <a href="tel:+13433224110">Call</a></p>
        <a href="#top" style="color:var(--ctp-sapphire);">Back to top</a>
    </footer>
</body>
</html>
