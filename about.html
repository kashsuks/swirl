<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swirl About</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            background: linear-gradient(135deg, #b4befe 0%, #f5e0dc 100%);
            color: #1e1e2e;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5em;
        }
        .about {
            font-size: 1.3rem;
            background: #cdd6f4;
            color: #575268;
            padding: 1em 2em;
            border-radius: 1em;
            box-shadow: 0 2px 8px #b4befe33;
            margin-bottom: 2em;
        }
        img {
            border-radius: 1em;
            box-shadow: 0 4px 24px #b4befe55;
            max-width: 250px;
        }
    </style>
</head>
<body>
    <h1>About Swirl</h1>
    <div class="about">Swirl is a static site inspired by the Catppuccin theme. It's colorful, cozy, and a little bit quirky. Enjoy the pastel palette and the playful cats!</div>
    <img src="https://catppuccin.github.io/assets/macchiato.png" alt="Catppuccin Macchiato">
</body>
</html>
